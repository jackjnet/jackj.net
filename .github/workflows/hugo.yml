name: Deploy Hugo Site to Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.128.0/hugo_extended_0.128.0_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Build Hugo site
        run: |
          hugo --minify --destination public --baseURL "https://jackj.net/"

      - name: Deploy Hugo site
        run: |
          sudo rsync -avz --delete public/ /srv/jackj.net/
